<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .board-container {
            text-align: center;
        }
        
        h2 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            gap: 2px;
            background-color: #333;
            padding: 2px;
        }
        
        .cell {
            width: 40px;
            height: 40px;
            background-color: #4a90e2;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        
        .cell.miss {
            background-color: #999;
        }
        
        .cell.hit {
            background-color: #e24a4a;
        }
        
        .cell.ship {
            background-color: #2c3e50;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #357abd;
        }
        
        .status {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="board-container">
            <h2>Your Board</h2>
            <div id="player-board" class="board"></div>
        </div>
        
        <div class="board-container">
            <h2>Enemy Board</h2>
            <div id="enemy-board" class="board"></div>
        </div>
        
        <div class="status" id="status-message">Your turn! Click on enemy board to attack</div>
        
        <div class="controls">
            <button id="reset-btn">New Game</button>
            <button id="place-ships-btn">Place Ships Randomly</button>
        </div>
    </div>
    
    <script type="module" src="src/index.js"></script>
</body>
</html>
<link rel="stylesheet" href="styles.css">
